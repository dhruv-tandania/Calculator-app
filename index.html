<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator · CodSoft Level 1 Task 3</title>
 
 
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="task-card">

  
  <div class="task-header">
    <h1>
      <i class="fas fa-calculator"></i> 
      A simple calculator
    </h1>
    
  </div>

 
  <div class="calculator">
  
    <div class="display" id="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

   
    <div class="buttons">
     
      <button class="btn btn-function" data-value="clear">AC</button>
      <button class="btn btn-function" data-value="sign">±</button>
      <button class="btn btn-function" data-value="percent">%</button>
      <button class="btn btn-operator" data-value="÷">÷</button>

     
      <button class="btn" data-value="7">7</button>
      <button class="btn" data-value="8">8</button>
      <button class="btn" data-value="9">9</button>
      <button class="btn btn-operator" data-value="×">×</button>

     
      <button class="btn" data-value="4">4</button>
      <button class="btn" data-value="5">5</button>
      <button class="btn" data-value="6">6</button>
      <button class="btn btn-operator" data-value="−">−</button>

    
      <button class="btn" data-value="1">1</button>
      <button class="btn" data-value="2">2</button>
      <button class="btn" data-value="3">3</button>
      <button class="btn btn-operator" data-value="+">+</button>

      
      <button class="btn btn-zero" data-value="0">0</button>
      <button class="btn" data-value=".">.</button>
      <button class="btn btn-equals" data-value="equals">=</button>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

  
    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');

  
    let currentInput = '0';        
    let expression = '';           
    let operator = null;          
    let previousValue = null;     
    let shouldResetDisplay = false;
    let justEvaluated = false;    

   
    function updateDisplay() {
   
      let displayValue = currentInput;
      if (displayValue === 'Infinity' || displayValue === '-Infinity' || displayValue === 'NaN') {
        resultEl.textContent = 'Error';
        resultEl.classList.add('error');
      } else {
        resultEl.classList.remove('error');
        resultEl.textContent = displayValue;
      }
   
      expressionEl.textContent = expression;
    }

   
    function resetCalculator() {
      currentInput = '0';
      expression = '';
      operator = null;
      previousValue = null;
      shouldResetDisplay = false;
      justEvaluated = false;
      updateDisplay();
    }

    function inputDigit(digit) {
      if (shouldResetDisplay) {
        currentInput = digit;
        shouldResetDisplay = false;
      } else {
     
        if (currentInput.length >= 16) return;
        if (currentInput === '0' && digit !== '.') {
          currentInput = digit;
        } else {
          currentInput += digit;
        }
      }
     
      if (justEvaluated) {
        expression = '';
        justEvaluated = false;
      }
      updateDisplay();
    }

  
    function inputDecimal() {
      if (shouldResetDisplay) {
        currentInput = '0.';
        shouldResetDisplay = false;
        updateDisplay();
        return;
      }
      if (!currentInput.includes('.')) {
        currentInput += '.';
      }
      if (justEvaluated) {
        expression = '';
        justEvaluated = false;
      }
      updateDisplay();
    }

  
    function handleOperator(op) {
      const currentNumber = parseFloat(currentInput);
      if (isNaN(currentNumber)) return;

      if (operator && previousValue !== null && !shouldResetDisplay) {
     
        const result = compute(previousValue, currentNumber, operator);
        if (result === 'Error') {
          resetCalculator();
          resultEl.textContent = 'Error';
          resultEl.classList.add('error');
          return;
        }
        currentInput = String(result);
        previousValue = result;
     
        expression = `${expression} ${op}`;
      } else {
    
        previousValue = currentNumber;
        expression = `${currentInput} ${op}`;
      }

      operator = op;
      shouldResetDisplay = true;
      justEvaluated = false;
      updateDisplay();
    }

    function compute(a, b, op) {
      let result;
      switch (op) {
        case '+': result = a + b; break;
        case '−': result = a - b; break;
        case '×': result = a * b; break;
        case '÷': 
          if (b === 0) return 'Error';
          result = a / b; 
          break;
        default: return b;
      }
  
      if (typeof result === 'number' && !Number.isInteger(result)) {
        result = parseFloat(result.toPrecision(12));
      }
      return result;
    }

  
    function evaluate() {
      if (operator === null || previousValue === null) {
      
        if (expression && !expression.endsWith('=')) {
       
        }
        return;
      }
      const currentNumber = parseFloat(currentInput);
      if (isNaN(currentNumber)) return;

      const result = compute(previousValue, currentNumber, operator);
      if (result === 'Error') {
        resetCalculator();
        resultEl.textContent = 'Error';
        resultEl.classList.add('error');
        return;
      }

  
      expression = `${previousValue} ${operator} ${currentNumber} =`;
      currentInput = String(result);
      operator = null;
      previousValue = null;
      shouldResetDisplay = true;
      justEvaluated = true;
      updateDisplay();
    }

   
    function unaryOperation(type) {
      if (currentInput === '0' && type === 'sign') return;
      let num = parseFloat(currentInput);
      if (isNaN(num)) return;

      if (type === 'sign') {
        num = -num;
        currentInput = String(num);
      } else if (type === 'percent') {
        num = num / 100;
        currentInput = String(num);
      }
      
      if (operator && previousValue !== null && !shouldResetDisplay) {
      }
      if (justEvaluated) {
        expression = '';
        justEvaluated = false;
      }
      updateDisplay();
    }

    // clear (AC)
    function clearAll() {
      resetCalculator();
    }

  
    const buttons = document.querySelectorAll('.btn');
    buttons.forEach(btn => {
      btn.addEventListener('click', function(e) {
        const value = this.getAttribute('data-value');
        if (!value) return;

        // digits
        if (value >= '0' && value <= '9') {
          inputDigit(value);
          return;
        }

        switch (value) {
          case '.':
            inputDecimal();
            break;
          case '+':
          case '−':
          case '×':
          case '÷':
            handleOperator(value);
            break;
          case 'equals':
            evaluate();
            break;
          case 'clear':
            clearAll();
            break;
          case 'sign':
            unaryOperation('sign');
            break;
          case 'percent':
            unaryOperation('percent');
            break;
          default:
            break;
        }
      });
    });

  
    document.addEventListener('keydown', function(e) {
      const key = e.key;
      if (key >= '0' && key <= '9') {
        e.preventDefault();
        inputDigit(key);
        return;
      }
      switch (key) {
        case '.':
          e.preventDefault();
          inputDecimal();
          break;
        case '+':
          e.preventDefault();
          handleOperator('+');
          break;
        case '-':
          e.preventDefault();
          handleOperator('−');
          break;
        case '*':
          e.preventDefault();
          handleOperator('×');
          break;
        case '/':
          e.preventDefault();
          handleOperator('÷');
          break;
        case 'Enter':
        case '=':
          e.preventDefault();
          evaluate();
          break;
        case 'Backspace':
          break;
        case 'Escape':
          e.preventDefault();
          clearAll();
          break;
        case '%':
          e.preventDefault();
          unaryOperation('percent');
          break;
        default:
          break;
      }
    });

   
    const demoBtn = document.getElementById('demoTrigger');
    demoBtn.addEventListener('click', function(e) {
      e.preventDefault();
     
      resetCalculator();
 
      setTimeout(() => { inputDigit('4'); }, 80);
      setTimeout(() => { inputDigit('2'); }, 140);
      setTimeout(() => { handleOperator('+'); }, 220);
      setTimeout(() => { inputDigit('1'); }, 300);
      setTimeout(() => { inputDigit('8'); }, 360);
      setTimeout(() => { evaluate(); }, 440);
      // also flash the demo link 
      demoBtn.style.backgroundColor = '#d9e2f8';
      setTimeout(() => { demoBtn.style.backgroundColor = ''; }, 500);
    });

    // init
    resetCalculator();
  })();
</script>

</body>
</html>
